apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    #  Git repository URL
    repoURL: 'https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.'
    targetRevision: main
    path: monitoring-stack  # Points to the directory containing the child apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
