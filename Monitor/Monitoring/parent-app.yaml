apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    # ⚠️ REPLACE THIS with your actual Git repository URL
    repoURL: 'https://github.com/your-username/your-gitops-repo.git'
    targetRevision: HEAD
    path: monitoring-stack  # Points to the directory containing the child apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true