apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: "2.9.11"
      helm:
        valueFiles:
          - $values/Monitor/monitoring/loki-values.yaml
    - repoURL: https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
