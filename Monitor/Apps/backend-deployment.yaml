apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: hashicorp/http-echo:latest
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: trackingdb
        - name: DB_USER
          value: admin
        - name: DB_PASSWORD
          value: admin123
        ports:
        - containerPort: 5000
