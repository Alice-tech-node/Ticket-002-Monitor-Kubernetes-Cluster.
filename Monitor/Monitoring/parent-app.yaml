apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    # Git repository URL
    repoURL: 'https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.'
    targetRevision: main
    # Points to the directory containing the child apps
    path: Monitoring 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
