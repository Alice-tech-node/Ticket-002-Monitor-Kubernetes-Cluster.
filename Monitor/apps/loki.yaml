apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.3"
    helm:
      valueFiles:
        - $values/monitoring/loki-values.yaml

    repoURL: https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.
    targetRevision: main
    ref: values
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
