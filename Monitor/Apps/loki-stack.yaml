apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki-stack
    targetRevision: 2.10.2  # Stable version pinned
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: false
        promtail:
          enabled: true
          config:
            # Connects promtail to the loki service in the same namespace
            lokiAddress: http://{{ include "loki.fullname" . }}:3100/loki/api/v1/push
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true