apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: "10.5.15"
      helm:
        valueFiles:
          - $values/Monitor/monitoring/grafana-values.yaml
    - repoURL: hhttps://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
