apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infrastructure-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.git'
    targetRevision: main
    path: Monitor/Apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

