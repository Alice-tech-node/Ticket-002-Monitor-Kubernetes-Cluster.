apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts/
    chart: kube-prometheus-stack
    targetRevision: "87.2.1"
    helm:
      valueFiles:
        - $values/monitoring/prometheus-values.yaml
        
    repoURL: https://github.com/Alice-tech-node/Ticket-002-Monitor-Kubernetes-Cluster.
    targetRevision: main
    ref: values
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
